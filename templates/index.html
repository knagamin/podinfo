<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pod Info</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#ffffff;
  color:#111111;
}

header{
  padding:20px 40px;
  border-bottom:1px solid #eee;
  font-size:20px;
  font-weight:600;
  letter-spacing:1px;
}

.container{
  max-width:900px;
  margin:80px auto;
  padding:0 20px;
}

.card{
  border:1px solid #eee;
  border-radius:6px;
  padding:40px;
  background:white;
}

.title{
  font-size:28px;
  font-weight:600;
  margin-bottom:30px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  font-weight:500;
  padding:12px 0;
  border-bottom:2px solid #111;
  letter-spacing:0.5px;
}

td{
  padding:14px 0;
  border-bottom:1px solid #eee;
  font-size:15px;
}

.label{
  width:30%;
  color:#666;
}

.value{
  font-weight:500;
}

.accent{
  color:#2563eb;
}

footer{
  text-align:center;
  margin-top:60px;
  font-size:13px;
  color:#888;
}

</style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">
      Pod Info
    </div>

    <table>
      <tr>
        <th class="accent">Field</th>
        <th class="accent">Value</th>
      </tr>

      <tr>
        <td class="label">Name</td>
        <td class="value">{{ .Name }}</td>
      </tr>

      <tr>
        <td class="label">Node</td>
        <td class="value">{{ .Node }}</td>
      </tr>

      <tr>
        <td class="label">IP Address</td>
        <td class="value">{{ .IPAddr }}</td>
      </tr>

    </table>

  </div>

</div>

<footer>
  Simple Test App for k8s
</footer>

</body>
</html>
